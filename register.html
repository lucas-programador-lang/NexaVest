<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaVest | Criar Conta Premium</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos do Toast para eliminar o alert nativo */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .custom-toast {
            background-color: #111827;
            color: #ffffff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease-out forwards;
            border-left: 4px solid var(--emerald);
        }
        .custom-toast.danger {
            border-left-color: #ef4444;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div id="toast-container" class="toast-container"></div>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </a>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline">Já tenho conta</a>
        </div>
    </nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(circle at center, #1e293b 0%, #070b14 100%);">
        <div class="auth-card" style="max-width: 460px;">
            <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </div>
            
            <h2 style="text-align: center; margin-bottom: 0.5rem; font-weight: 800; font-size: 1.8rem;">Crie sua Conta Premium</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">Faça parte do ecossistema inteligente de investimentos.</p>
            
            <form id="register-form">
                
                <div class="input-group">
                    <label><i class="fa-regular fa-user"></i> Nome Completo</label>
                    <input type="text" id="fullname" class="input-premium" placeholder="Seu nome e sobrenome" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-regular fa-id-card"></i> CPF (Apenas números)</label>
                    <input type="text" id="cpf" class="input-premium" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-regular fa-envelope"></i> Endereço de E-mail</label>
                    <input type="email" id="email" class="input-premium" placeholder="seu@email.com" required autocomplete="username" autocapitalize="off" autocorrect="off">
                </div>
                
                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> Crie uma Senha Forte</label>
                    <input type="password" id="password" class="input-premium" placeholder="No mínimo 8 caracteres" required autocomplete="new-password">
                </div>

                <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 2rem; text-align: left;">
                    <input type="checkbox" id="terms" style="accent-color: var(--emerald); cursor: pointer; margin-top: 4px;" required>
                    <label for="terms" style="color: var(--text-muted); font-size: 0.85rem; cursor: pointer; user-select: none; line-height: 1.4;">
                        Eu aceito e concordo com os <a href="#" style="color: var(--emerald); text-decoration: none; font-weight: 600;">Termos de Serviço</a> e as <a href="#" style="color: var(--emerald); text-decoration: none; font-weight: 600;">Políticas de Privacidade</a> de rendimento da NexaVest.
                    </label>
                </div>

                <div class="input-group" style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                    <div class="g-recaptcha" data-sitekey="6Lew2_IsAAAAALlOfwDpD6mptrWC_QCw4KksUrdA"></div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Concluir Cadastro <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                Já possui uma conta activa? <a href="login.html" style="color: var(--emerald); text-decoration: none; font-weight: 600; border-bottom: 1px dashed var(--emerald);">Efetuar Login</a>
            </p>
        </div>
    </main>

    <footer style="padding: 1.5rem 5%;">
        <p style="color: var(--text-muted); font-size: 0.85rem;">&copy; 2026 NexaVest. Dados estritamente protegidos sob as diretrizes de segurança de criptoativos.</p>
    </footer>

<script type="module">
    import { auth, createUserWithEmailAndPassword, db, doc, setDoc, updateDoc, increment } from "./firebase-config.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- FUNÇÃO CORRIGIDA DENTRO DO MÓDULO ---
    function showToast(message, type) {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = `toast ${type === 'danger' ? 'danger' : 'info'} show`;
        toast.innerHTML = `<span>${message}</span>`;
        
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }
    // ------------------------------------------

    const urlParams = new URLSearchParams(window.location.search);
    const indicadorRef = urlParams.get('ref') || null;

    const registerForm = document.getElementById('register-form') || document.querySelector('form');

    function gerarCodigoAfiliado() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let resultado = 'NX'; 
        for (let i = 0; i < 4; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        return resultado;
    }

    if (registerForm) {
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (typeof grecaptcha === 'undefined' || grecaptcha.getResponse().length === 0) {
                showToast('Por favor, complete o desafio "Não sou robô".', 'danger');
                return;
            }

            let createdUser = null;

            try {
                const emailInput = document.getElementById('email') || registerForm.querySelector('input[type="email"]');
                const passwordInput = document.getElementById('password') || registerForm.querySelector('input[type="password"]');
                const fullnameInput = document.getElementById('fullname') || registerForm.querySelector('input[type="text"]:not(#cpf)');
                const cpfInput = document.getElementById('cpf');

                if (!emailInput || !passwordInput || !cpfInput) {
                    throw new Error("Campos obrigatórios de cadastro não foram localizados no HTML.");
                }

                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value;
                const fullname = fullnameInput ? fullnameInput.value.trim() : "Investidor NexaVest";
                const cpfClean = cpfInput.value.replace(/\D/g, ''); 

                if (cpfClean.length !== 11) {
                    showToast('Por favor, insira um CPF válido com 11 dígitos.', 'danger');
                    return;
                }

                const usersRef = collection(db, "users");
                const cpfQuery = query(usersRef, where("cpf", "==", cpfClean));
                const cpfQuerySnapshot = await getDocs(cpfQuery);

                if (!cpfQuerySnapshot.empty) {
                    showToast('Este CPF já está vinculado a outra conta cadastrada.', 'danger');
                    if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                    return;
                }

                let uidPadrinho = null;
                if (indicadorRef) {
                    try {
                        const qIndicador = query(usersRef, where("codigo_afiliado", "==", indicadorRef.toUpperCase().trim()));
                        const indicadorSnapshot = await getDocs(qIndicador);

                        if (!indicadorSnapshot.empty) {
                            uidPadrinho = indicadorSnapshot.docs[0].id;
                        } else {
                            const fallbackQuery = query(usersRef, where("__name__", "==", indicadorRef));
                            const fallbackSnapshot = await getDocs(fallbackQuery);
                            if (!fallbackSnapshot.empty) {
                                uidPadrinho = indicadorRef;
                            }
                        }
                    } catch (err) {
                        console.error("Erro ao converter código de indicação:", err);
                    }
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                createdUser = userCredential.user;
                
                const novoCodigoAfiliado = gerarCodigoAfiliado();
                
                await setDoc(doc(db, "users", createdUser.uid), {
                    nome: fullname,
                    cpf: cpfClean,
                    email: email,
                    saldo: 0.00,
                    rendimentos: 0.00,
                    afiliados_ativos: 0,
                    codigo_afiliado: novoCodigoAfiliado,
                    indicado_por: uidPadrinho,
                    data_cadastro: new Date().toISOString()
                });

                if (uidPadrinho) {
                    try {
                        const padrinhoRef = doc(db, "users", uidPadrinho);
                        await updateDoc(padrinhoRef, { afiliados_ativos: increment(1) });
                    } catch (err) {
                        console.error("Erro ao incrementar contador de afiliados do padrinho:", err);
                    }
                }
                
                window.location.href = 'login.html?action=registered';

            } catch (error) {
                console.error("Erro completo no processo de cadastro:", error);
                if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
                
                if (createdUser && auth.currentUser) {
                    await auth.currentUser.delete();
                }
                
                let userMessage = 'Erro ao realizar o cadastro. Tente outra combinação.';
                
                if (error.code === 'auth/email-already-in-use') {
                    userMessage = 'Este endereço de e-mail já está cadastrado no sistema.';
                } else if (error.code === 'auth/weak-password') {
                    userMessage = 'A senha escolhida é muito fraca. Use pelo menos 6 caracteres.';
                } else if (error.code === 'auth/invalid-email') {
                    userMessage = 'O formato do e-mail inserido é inválido.';
                } else if (error.message && error.message.includes('permission-denied')) {
                    userMessage = 'Erro de permissão no servidor. Verifique as regras do Firestore.';
                }
                
                showToast(userMessage, 'danger');
            }
        });
    } else {
        alert("Erro crítico: O formulário de registro não foi encontrado na árvore DOM.");
    }
</script>
</body>
</html>
