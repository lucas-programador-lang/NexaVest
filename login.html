<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaVest | Acessar Plataforma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos do Toast para eliminar o alert nativo */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .custom-toast {
            background-color: #111827;
            color: #ffffff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease-out forwards;
            border-left: 4px solid var(--emerald);
        }
        .custom-toast.danger {
            border-left-color: #ef4444;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <div id="toast-container" class="toast-container"></div>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </a>
        </div>
        <div class="nav-actions">
            <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Voltar ao Início</a>
        </div>
    </nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(circle at center, #1e293b 0%, #070b14 100%);">
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </div>
            
            <h2 style="text-align: center; margin-bottom: 0.5rem; font-weight: 800; font-size: 1.8rem;">Acesse sua Conta</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">Insira suas credenciais para gerenciar seus rendimentos.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label><i class="fa-regular fa-envelope"></i> Endereço de E-mail</label>
                    <input type="email" id="email" class="input-premium" placeholder="seu@email.com" required autocomplete="username" autocapitalize="off" autocorrect="off">
                </div>
                
                <div class="input-group" style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;"><i class="fa-solid fa-lock"></i> Sua Senha</label>
                        <a href="#" style="color: var(--emerald); text-decoration: none; font-size: 0.85rem; font-weight: 600;">Esqueceu a senha?</a>
                    </div>
                    <input type="password" id="password" class="input-premium" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2rem;">
                    <input type="checkbox" id="remember" style="accent-color: var(--emerald); cursor: pointer;">
                    <label for="remember" style="color: var(--text-muted); font-size: 0.85rem; cursor: pointer; user-select: none;">Manter-me conectado</label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Entrar no Painel <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                Não possui uma conta? <a href="register.html" style="color: var(--emerald); text-decoration: none; font-weight: 600; border-bottom: 1px dashed var(--emerald);">Cadastre-se agora</a>
            </p>
        </div>
    </main>

    <footer style="padding: 1.5rem 5%;">
        <p style="color: var(--text-muted); font-size: 0.85rem;">&copy; 2026 NexaVest. Conexão criptografada de alta segurança de ponta a ponta.</p>
    </footer>

    <script>
        // Função global de Toast injetada mantendo o comportamento esperado pelo seu script original
        window.showToast = function(message, type = 'danger') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            
            const icon = type === 'danger' ? 'fa-circle-xmark' : 'fa-circle-check';
            const iconColor = type === 'danger' ? '#ef4444' : 'var(--emerald)';
            
            toast.innerHTML = `
                <i class="fa-solid ${icon}" style="color: ${iconColor}; font-size: 1.1rem;"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-out forwards';
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 4000);
        }

        // Alerta opcional caso o usuário venha redirecionado do registro bem-sucedido
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'registered' && typeof window.showToast === 'function') {
                window.showToast('Conta criada com sucesso! Realize o seu primeiro acesso.', 'success');
            }
        });
    </script>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from "./firebase-config.js";

        const loginForm = document.getElementById('login-form');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const emailInput = document.getElementById('email');
                const passwordInput = document.getElementById('password');

                if (!emailInput || !passwordInput) return;

                // CORREÇÃO EFETIVA: Aplicação do .trim() e .toLowerCase() para evitar falhas de digitação em teclados mobile
                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value;

                try {
                    // Realiza a autenticação com e-mail e senha no Firebase
                    await signInWithEmailAndPassword(auth, email, password);
                    
                    // Redireciona para o arquivo físico do painel administrativo
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    console.error("Erro na autenticação do Firebase:", error.code, error.message);
                    
                    // Dispara o Toast se a estrutura global de avisos existir na aplicação
                    if (typeof showToast === 'function') {
                        showToast('Credenciais incorretas ou inválidas. Tente novamente.', 'danger');
                    } else {
                        alert('Erro ao acessar a conta: Verifique o e-mail e a senha informados.');
                    }
                }
            });
        }
    </script>

</body>
</html>
