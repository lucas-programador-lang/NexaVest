<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaVest | Acessar Plataforma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Navbar Simplificada para Telas de Autenticação -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </a>
        </div>
        <div class="nav-actions">
            <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Voltar ao Início</a>
        </div>
    </nav>

    <!-- Container Centralizado com efeito de Blur e Centralização Absoluta -->
    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(circle at center, #1e293b 0%, #070b14 100%);">
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-chart-line"></i> NexaVest
            </div>
            
            <h2 style="text-align: center; margin-bottom: 0.5rem; font-weight: 800; font-size: 1.8rem;">Acesse sua Conta</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">Insira suas credenciais para gerenciar seus rendimentos.</p>
            
            <!-- IDs adicionados de forma limpa para captura no script modular do Firebase -->
            <form id="login-form">
                <div class="input-group">
                    <label><i class="fa-regular fa-envelope"></i> Endereço de E-mail</label>
                    <input type="email" id="email" class="input-premium" placeholder="seu@email.com" required autocomplete="username">
                </div>
                
                <div class="input-group" style="margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;"><i class="fa-solid fa-lock"></i> Sua Senha</label>
                        <a href="#" style="color: var(--emerald); text-decoration: none; font-size: 0.85rem; font-weight: 600;">Esqueceu a senha?</a>
                    </div>
                    <input type="password" id="password" class="input-premium" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2rem;">
                    <input type="checkbox" id="remember" style="accent-color: var(--emerald); cursor: pointer;">
                    <label for="remember" style="color: var(--text-muted); font-size: 0.85rem; cursor: pointer; user-select: none;">Manter-me conectado</label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Entrar no Painel <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
                Não possui uma conta? <a href="register.html" style="color: var(--emerald); text-decoration: none; font-weight: 600; border-bottom: 1px dashed var(--emerald);">Cadastre-se agora</a>
            </p>
        </div>
    </main>

    <!-- Rodapé Minimalista -->
    <footer style="padding: 1.5rem 5%;">
        <p style="color: var(--text-muted); font-size: 0.85rem;">&copy; 2026 NexaVest. Conexão criptografada de alta segurança de ponta a ponta.</p>
    </footer>

    <!-- Lógica de Autenticação com o Firebase -->
    <script type="module">
        import { auth, signInWithEmailAndPassword } from "./firebase-config.js";

        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Realiza a autenticação com e-mail e senha no Firebase
                await signInWithEmailAndPassword(auth, email, password);
                
                // Redireciona para o arquivo físico do painel administrativo
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error("Erro na autenticação do Firebase:", error.code, error.message);
                
                // Dispara o Toast se a estrutura global de avisos existir na aplicação
                if (typeof showToast === 'function') {
                    showToast('Credenciais incorretas ou inválidas. Tente novamente.', 'danger');
                } else {
                    alert('Erro ao acessar a conta: Verifique o e-mail e a senha informados.');
                }
            }
        });
    </script>

</body>
</html>
